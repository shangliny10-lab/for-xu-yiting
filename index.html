<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>For Xu Yiting ✦ 3D Earth from Space</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-tap-highlight-color:transparent;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}

/* Vignette overlay */
#vignette{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:10;
  background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,10,0.35) 75%,rgba(0,0,20,0.7) 100%);
}

/* Romance text layer */
#romance-layer{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:20;
}
.romance-msg{
  position:absolute;
  color:#ffd700;font-weight:bold;
  text-align:center;
  text-shadow:0 0 12px rgba(255,107,157,0.6),0 0 24px rgba(255,180,50,0.3);
  white-space:nowrap;
  animation:romanceFloat 4.5s ease-out forwards;
}
@keyframes romanceFloat{
  0%{opacity:0;transform:translateY(0) scale(0.7);}
  8%{opacity:1;transform:translateY(-8px) scale(1.05);}
  15%{opacity:1;transform:translateY(-20px) scale(1);}
  65%{opacity:0.7;transform:translateY(-70px) scale(1);}
  100%{opacity:0;transform:translateY(-120px) scale(0.85);}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="romance-layer"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── DOM refs ──────────────────────────────────
var canvas = document.getElementById('c');
var romanceLayer = document.getElementById('romance-layer');

// ── Three.js setup ────────────────────────────
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 0.3, 4.5);
camera.lookAt(3, -1, -8);

// ── Lights ────────────────────────────────────
var ambientLight = new THREE.AmbientLight(0x111133, 1.8);
scene.add(ambientLight);
var sunLight = new THREE.DirectionalLight(0xffeedd, 3.5);
sunLight.position.set(8, 2, 2);
scene.add(sunLight);
var fillLight = new THREE.DirectionalLight(0x4466aa, 0.8);
fillLight.position.set(-3, -1, -4);
scene.add(fillLight);

// ── Helpers ───────────────────────────────────
function r(a, b) { return a + Math.random() * (b - a); }
function ri(a, b) { return Math.floor(r(a, b + 1)); }
function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

// ── STARFIELD (5000+ points, 3 depth layers) ──
var starFieldGroup = new THREE.Group();
scene.add(starFieldGroup);

function createStarLayer(count, radius, sizes, colors) {
  var geom = new THREE.BufferGeometry();
  var positions = new Float32Array(count * 3);
  var colorArr = new Float32Array(count * 3);
  var sizeArr = new Float32Array(count);
  for (var i = 0; i < count; i++) {
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);
    var rr = radius + r(-radius * 0.08, radius * 0.08);
    positions[i * 3] = rr * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = rr * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = rr * Math.cos(phi);
    var col = pick(colors);
    colorArr[i * 3] = col[0];
    colorArr[i * 3 + 1] = col[1];
    colorArr[i * 3 + 2] = col[2];
    sizeArr[i] = r(sizes[0], sizes[1]);
  }
  geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colorArr, 3));
  geom.setAttribute('size', new THREE.BufferAttribute(sizeArr, 1));
  var mat = new THREE.PointsMaterial({
    size: 0.12,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.85,
    sizeAttenuation: true
  });
  return new THREE.Points(geom, mat);
}

var starColors1 = [[0.7,0.8,1],[0.6,0.75,0.95],[0.8,0.85,1],[0.5,0.7,0.9]];
var starColors2 = [[1,0.95,0.7],[1,0.9,0.6],[0.95,0.85,0.5],[1,1,0.85]];
var starColors3 = [[1,0.7,0.4],[1,0.6,0.3],[0.95,0.5,0.2],[1,0.75,0.35]];

var starsFar = createStarLayer(2200, 55, [0.06, 0.12], starColors1);
var starsMid = createStarLayer(1800, 40, [0.08, 0.16], starColors2);
var starsNear = createStarLayer(1200, 28, [0.1, 0.2], starColors3);
starFieldGroup.add(starsFar);
starFieldGroup.add(starsMid);
starFieldGroup.add(starsNear);

// ── NEBULAE (large semi-transparent planes) ───
var nebulaGroup = new THREE.Group();
scene.add(nebulaGroup);

function createNebulaTexture(innerColor, outerColor, size) {
  var cvs = document.createElement('canvas');
  cvs.width = size; cvs.height = size;
  var ctx = cvs.getContext('2d');
  var g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  g.addColorStop(0, innerColor);
  g.addColorStop(0.35, innerColor);
  g.addColorStop(0.7, outerColor);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, size, size);
  // secondary blob
  var g2 = ctx.createRadialGradient(size * 0.65, size * 0.4, 0, size * 0.65, size * 0.4, size * 0.35);
  g2.addColorStop(0, innerColor);
  g2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g2;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(cvs);
}

var nebulaDefs = [
  { color: 'rgba(255,80,140,0.18)', outer: 'rgba(180,40,100,0.04)', size: 512, planeSize: 22, pos: [-10, 3, -22], rot: [0.3, 0.2, 0.1] },
  { color: 'rgba(140,60,200,0.15)', outer: 'rgba(80,30,150,0.03)', size: 512, planeSize: 18, pos: [8, -2, -25], rot: [-0.2, -0.3, 0.4] },
  { color: 'rgba(60,120,220,0.13)', outer: 'rgba(30,60,180,0.03)', size: 512, planeSize: 20, pos: [-5, -4, -20], rot: [0.1, -0.2, -0.15] },
  { color: 'rgba(220,100,160,0.14)', outer: 'rgba(150,50,120,0.03)', size: 512, planeSize: 16, pos: [12, 5, -28], rot: [-0.15, 0.25, 0.3] },
  { color: 'rgba(100,180,255,0.12)', outer: 'rgba(40,100,200,0.03)', size: 512, planeSize: 19, pos: [-8, -1, -18], rot: [0.25, 0.15, -0.2] },
  { color: 'rgba(200,70,180,0.13)', outer: 'rgba(130,30,140,0.03)', size: 512, planeSize: 17, pos: [3, 6, -24], rot: [-0.3, 0.1, 0.5] },
];

var nebulae = [];
nebulaDefs.forEach(function (def) {
  var tex = createNebulaTexture(def.color, def.outer, def.size);
  var mat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide,
    opacity: 0.7
  });
  var plane = new THREE.Mesh(new THREE.PlaneGeometry(def.planeSize, def.planeSize), mat);
  plane.position.set(def.pos[0], def.pos[1], def.pos[2]);
  plane.rotation.set(def.rot[0], def.rot[1], def.rot[2]);
  plane.userData = { rotSpeed: r(-0.00015, 0.00015), baseRot: plane.rotation.clone(), rotAxis: def.rot };
  nebulaGroup.add(plane);
  nebulae.push(plane);
});

// ── EARTH TEXTURE (procedural canvas) ─────────
function createEarthTexture() {
  var cvs = document.createElement('canvas');
  cvs.width = 2048; cvs.height = 1024;
  var ctx = cvs.getContext('2d');
  var W = cvs.width, H = cvs.height;

  // Ocean base gradient
  var oceanGrad = ctx.createLinearGradient(0, 0, 0, H);
  oceanGrad.addColorStop(0, '#0a1e5c');
  oceanGrad.addColorStop(0.15, '#0d2a8a');
  oceanGrad.addColorStop(0.4, '#0f38b8');
  oceanGrad.addColorStop(0.5, '#1144cc');
  oceanGrad.addColorStop(0.6, '#0f38b8');
  oceanGrad.addColorStop(0.85, '#0d2a8a');
  oceanGrad.addColorStop(1, '#0a1e5c');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, W, H);

  // Ocean texture variations
  for (var i = 0; i < 200; i++) {
    var ox = r(0, W), oy = r(0, H);
    var orad = r(15, 60);
    var og = ctx.createRadialGradient(ox, oy, 0, ox, oy, orad);
    og.addColorStop(0, 'rgba(20,60,180,' + r(0.05, 0.2) + ')');
    og.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.arc(ox, oy, orad, 0, Math.PI * 2); ctx.fill();
  }

  // Continent landmasses (drawn as overlapping ellipses)
  var continents = [
    // Eurasia-like
    { cx: W * 0.28, cy: H * 0.35, rx: W * 0.22, ry: H * 0.15, rot: 0.05, g1: 'rgba(30,140,50,0.9)', g2: 'rgba(15,90,30,0.75)', g3: 'rgba(8,50,15,0.4)' },
    { cx: W * 0.32, cy: H * 0.42, rx: W * 0.18, ry: H * 0.18, rot: -0.08, g1: 'rgba(35,145,55,0.85)', g2: 'rgba(18,95,35,0.7)', g3: 'rgba(10,55,18,0.35)' },
    { cx: W * 0.22, cy: H * 0.5, rx: W * 0.12, ry: H * 0.1, rot: 0.2, g1: 'rgba(28,135,48,0.8)', g2: 'rgba(14,85,28,0.65)', g3: 'rgba(7,45,12,0.3)' },
    // Africa-like
    { cx: W * 0.35, cy: H * 0.58, rx: W * 0.08, ry: H * 0.14, rot: 0.03, g1: 'rgba(40,150,60,0.88)', g2: 'rgba(20,100,35,0.72)', g3: 'rgba(10,60,20,0.38)' },
    { cx: W * 0.36, cy: H * 0.65, rx: W * 0.07, ry: H * 0.08, rot: -0.05, g1: 'rgba(35,145,55,0.83)', g2: 'rgba(18,95,32,0.68)', g3: 'rgba(8,50,15,0.33)' },
    // North America-like
    { cx: W * 0.62, cy: H * 0.32, rx: W * 0.1, ry: H * 0.16, rot: -0.1, g1: 'rgba(32,142,52,0.87)', g2: 'rgba(16,92,30,0.7)', g3: 'rgba(8,48,14,0.36)' },
    { cx: W * 0.65, cy: H * 0.4, rx: W * 0.08, ry: H * 0.08, rot: 0.12, g1: 'rgba(28,138,48,0.82)', g2: 'rgba(14,88,28,0.66)', g3: 'rgba(7,44,12,0.3)' },
    // South America-like
    { cx: W * 0.64, cy: H * 0.6, rx: W * 0.05, ry: H * 0.1, rot: 0.05, g1: 'rgba(30,140,50,0.85)', g2: 'rgba(15,90,30,0.7)', g3: 'rgba(8,48,15,0.34)' },
    // Australia-like
    { cx: W * 0.24, cy: H * 0.68, rx: W * 0.06, ry: H * 0.06, rot: 0.15, g1: 'rgba(45,130,40,0.82)', g2: 'rgba(25,85,22,0.66)', g3: 'rgba(12,50,10,0.3)' },
    // Antarctica
    { cx: W * 0.5, cy: H * 0.93, rx: W * 0.35, ry: H * 0.08, rot: 0, g1: 'rgba(240,245,250,0.9)', g2: 'rgba(220,230,240,0.7)', g3: 'rgba(200,215,230,0.4)' },
    // Greenland-like
    { cx: W * 0.6, cy: H * 0.2, rx: W * 0.04, ry: H * 0.05, rot: -0.1, g1: 'rgba(235,240,248,0.85)', g2: 'rgba(210,225,238,0.65)', g3: 'rgba(190,210,230,0.35)' },
    // Additional small islands
    { cx: W * 0.3, cy: H * 0.72, rx: W * 0.025, ry: H * 0.025, rot: 0.3, g1: 'rgba(30,140,50,0.75)', g2: 'rgba(15,88,28,0.6)', g3: 'rgba(7,45,12,0.25)' },
  ];

  continents.forEach(function (c) {
    var cg = ctx.createRadialGradient(c.cx - c.rx * 0.15, c.cy - c.ry * 0.15, 0, c.cx, c.cy, Math.max(c.rx, c.ry));
    cg.addColorStop(0, c.g1);
    cg.addColorStop(0.4, c.g2);
    cg.addColorStop(1, c.g3);
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.ellipse(c.cx, c.cy, c.rx, c.ry, c.rot, 0, Math.PI * 2); ctx.fill();
    // Coastline
    ctx.beginPath(); ctx.ellipse(c.cx, c.cy, c.rx, c.ry, c.rot, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(60,200,100,0.35)'; ctx.lineWidth = r(1, 3); ctx.stroke();
  });

  // Coastline bumps for irregularity
  for (var j = 0; j < 40; j++) {
    var bx = r(W * 0.15, W * 0.7), by = r(H * 0.3, H * 0.7);
    var brx = r(W * 0.01, W * 0.04), bry = r(H * 0.01, H * 0.04);
    var bg = ctx.createRadialGradient(bx, by, 0, bx, by, Math.max(brx, bry));
    bg.addColorStop(0, 'rgba(30,145,55,0.5)');
    bg.addColorStop(0.6, 'rgba(15,90,35,0.25)');
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(bx, by, brx, bry, r(-0.2, 0.2), 0, Math.PI * 2); ctx.fill();
  }

  // Cloud wisps
  for (var k = 0; k < 60; k++) {
    var wx = r(0, W), wy = r(H * 0.15, H * 0.85);
    var wr = r(15, 50);
    var wg = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
    wg.addColorStop(0, 'rgba(250,252,255,' + r(0.15, 0.4) + ')');
    wg.addColorStop(0.5, 'rgba(240,245,255,' + r(0.05, 0.2) + ')');
    wg.addColorStop(1, 'rgba(220,230,245,0)');
    ctx.fillStyle = wg;
    ctx.beginPath(); ctx.arc(wx, wy, wr, 0, Math.PI * 2); ctx.fill();
  }

  return new THREE.CanvasTexture(cvs);
}

// ── EARTH ─────────────────────────────────────
var earthTexture = createEarthTexture();
earthTexture.colorSpace = THREE.SRGBColorSpace;
var earthGeom = new THREE.SphereGeometry(1.05, 64, 48);
var earthMat = new THREE.MeshPhongMaterial({
  map: earthTexture,
  specular: 0x224488,
  shininess: 8,
  emissive: 0x001122,
  emissiveIntensity: 0.25
});
var earthMesh = new THREE.Mesh(earthGeom, earthMat);

var earthGroup = new THREE.Group();
earthGroup.add(earthMesh);
earthGroup.position.set(3, -1, -8);
scene.add(earthGroup);

// ── ATMOSPHERE GLOW ───────────────────────────
var atmosGeom = new THREE.SphereGeometry(1.15, 64, 48);
var atmosMat = new THREE.ShaderMaterial({
  vertexShader: /*glsl*/`
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      vNormal = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /*glsl*/`
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    uniform vec3 uViewPos;
    void main() {
      vec3 viewDir = normalize(uViewPos - vWorldPos);
      float fresnel = 1.0 - abs(dot(viewDir, normalize(vNormal)));
      fresnel = pow(fresnel, 3.2);
      vec3 glowColor = mix(vec3(0.2, 0.5, 0.95), vec3(0.35, 0.7, 1.0), fresnel);
      float alpha = fresnel * 0.55;
      gl_FragColor = vec4(glowColor, alpha);
    }
  `,
  uniforms: { uViewPos: { value: new THREE.Vector3() } },
  transparent: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
var atmosphereMesh = new THREE.Mesh(atmosGeom, atmosMat);
atmosphereMesh.renderOrder = 1;
atmosphereMesh.material.depthTest = true;
earthGroup.add(atmosphereMesh);

// ── MOON ──────────────────────────────────────
function createMoonTexture() {
  var cvs = document.createElement('canvas');
  cvs.width = 512; cvs.height = 256;
  var ctx = cvs.getContext('2d');
  // Base grey
  var baseGrad = ctx.createLinearGradient(0, 0, 0, cvs.height);
  baseGrad.addColorStop(0, '#c8c4be');
  baseGrad.addColorStop(0.3, '#d4d0ca');
  baseGrad.addColorStop(0.5, '#d8d4ce');
  baseGrad.addColorStop(0.7, '#c0bcb6');
  baseGrad.addColorStop(1, '#a09c96');
  ctx.fillStyle = baseGrad;
  ctx.fillRect(0, 0, cvs.width, cvs.height);

  // Craters
  for (var i = 0; i < 120; i++) {
    var cx = r(0, cvs.width), cy = r(0, cvs.height);
    var cr = r(3, 20);
    var cg = ctx.createRadialGradient(cx, cy, cr * 0.1, cx, cy, cr);
    cg.addColorStop(0, 'rgba(80,75,70,0.55)');
    cg.addColorStop(0.5, 'rgba(130,125,120,0.2)');
    cg.addColorStop(1, 'rgba(180,175,170,0.05)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI * 2); ctx.fill();
    // Rim highlight
    ctx.beginPath(); ctx.arc(cx - cr * 0.2, cy - cr * 0.2, cr * 1.02, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200,195,190,0.3)'; ctx.lineWidth = cr * 0.12; ctx.stroke();
  }

  // Mare (dark patches)
  var mares = [
    [cvs.width * 0.45, cvs.height * 0.45, 40],
    [cvs.width * 0.35, cvs.height * 0.5, 28],
    [cvs.width * 0.55, cvs.height * 0.48, 32],
    [cvs.width * 0.4, cvs.height * 0.55, 22],
  ];
  mares.forEach(function (m) {
    var mg = ctx.createRadialGradient(m[0], m[1], 0, m[0], m[1], m[2]);
    mg.addColorStop(0, 'rgba(100,95,90,0.3)');
    mg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.arc(m[0], m[1], m[2], 0, Math.PI * 2); ctx.fill();
  });

  return new THREE.CanvasTexture(cvs);
}

var moonTexture = createMoonTexture();
moonTexture.colorSpace = THREE.SRGBColorSpace;
var moonGeom = new THREE.SphereGeometry(0.22, 32, 24);
var moonMat = new THREE.MeshPhongMaterial({
  map: moonTexture,
  specular: 0x111111,
  shininess: 3,
  emissive: 0x111111,
  emissiveIntensity: 0.15
});
var moonMesh = new THREE.Mesh(moonGeom, moonMat);
var moonGroup = new THREE.Group();
moonGroup.add(moonMesh);
moonGroup.position.set(2.0, -1.4, -9.5);
scene.add(moonGroup);

// ── METEOR SYSTEM ─────────────────────────────
var meteorGroup = new THREE.Group();
scene.add(meteorGroup);

var MAX_METEORS = 20;
var MAX_TRAIL_POINTS = 60;
var meteorsData = [];
var meteorMeshes = [];    // head meshes
var meteorTrails = [];    // trail line objects

function createMeteorHead() {
  var geom = new THREE.SphereGeometry(0.06, 6, 4);
  geom.scale(1, 0.35, 0.35);
  var mat = new THREE.MeshBasicMaterial({ color: 0xffdd55, blending: THREE.AdditiveBlending, depthWrite: false, transparent: true });
  return new THREE.Mesh(geom, mat);
}

function createMeteorTrailLine() {
  var positionsArr = new Float32Array(MAX_TRAIL_POINTS * 3);
  var colorsArr = new Float32Array(MAX_TRAIL_POINTS * 3);
  var geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(positionsArr, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
  geom.setDrawRange(0, 0);
  var mat = new THREE.LineBasicMaterial({
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.7
  });
  return new THREE.Line(geom, mat);
}

function spawnMeteor(init) {
  var startX = r(-15, 15);
  var startY = r(3, 10);
  var startZ = r(-15, -3);
  var speed = r(0.08, 0.25);
  var angleH = r(-0.8, -0.2);
  var angleV = r(-0.5, 0.2);
  var vx = Math.cos(angleH) * speed;
  var vy = Math.sin(angleH) * speed;
  var vz = Math.cos(angleV) * speed * 0.6;
  var isFireball = Math.random() < 0.1;
  var life = isFireball ? r(180, 350) : r(100, 250);
  var trailLen = isFireball ? ri(45, 60) : ri(25, 45);

  var data = {
    pos: new THREE.Vector3(startX, startY, startZ),
    vel: new THREE.Vector3(vx, vy, vz),
    life: life,
    maxLife: life,
    age: init ? r(0, life) : 0,
    isFireball: isFireball,
    trailLen: trailLen,
    trail: [],
    headColor: isFireball ? [1, 0.95, 0.7] : [1, 0.85, 0.35]
  };

  // Pre-fill trail for init
  if (init && data.age > 0) {
    for (var i = 0; i < trailLen; i++) {
      var t = i / trailLen;
      data.trail.push(data.pos.clone().add(
        new THREE.Vector3(-data.vel.x * t * 3, -data.vel.y * t * 3, -data.vel.z * t * 3)
      ));
    }
  }

  var head = createMeteorHead();
  if (isFireball) {
    head.material.color.set(0xffffdd);
    head.scale.set(1.8, 0.7, 0.7);
  }
  head.position.copy(data.pos);
  meteorGroup.add(head);

  var trailLine = createMeteorTrailLine();
  meteorGroup.add(trailLine);

  meteorsData.push(data);
  meteorMeshes.push(head);
  meteorTrails.push(trailLine);
}

for (var mi = 0; mi < MAX_METEORS; mi++) {
  spawnMeteor(true);
}

function updateMeteors() {
  for (var i = 0; i < meteorsData.length; i++) {
    var md = meteorsData[i];
    md.age++;
    md.pos.add(md.vel);

    // Add trail point
    md.trail.push(md.pos.clone());
    if (md.trail.length > md.trailLen) md.trail.shift();

    // Update head mesh
    meteorMeshes[i].position.copy(md.pos);

    // Update trail line
    var trailGeom = meteorTrails[i].geometry;
    var posArr = trailGeom.attributes.position.array;
    var colArr = trailGeom.attributes.color.array;
    var pts = md.trail.length;

    for (var j = 0; j < pts; j++) {
      var prog = j / (pts - 1 || 1);
      var p = md.trail[j];
      posArr[j * 3] = p.x;
      posArr[j * 3 + 1] = p.y;
      posArr[j * 3 + 2] = p.z;
      var alpha = prog;
      if (md.isFireball) {
        colArr[j * 3] = 1 * alpha;
        colArr[j * 3 + 1] = 0.9 * alpha;
        colArr[j * 3 + 2] = 0.6 * alpha;
      } else {
        colArr[j * 3] = 1 * alpha;
        colArr[j * 3 + 1] = 0.7 * alpha;
        colArr[j * 3 + 2] = 0.2 * alpha;
      }
    }
    trailGeom.attributes.position.needsUpdate = true;
    trailGeom.attributes.color.needsUpdate = true;
    trailGeom.setDrawRange(0, pts);

    // Reset if dead
    if (md.age > md.life || md.pos.y < -10 || Math.abs(md.pos.x) > 18 || Math.abs(md.pos.z) > 18) {
      var startX = r(-14, 14);
      var startY = r(3, 10);
      var startZ = r(-14, -3);
      var speed = r(0.08, 0.25);
      var angleH = r(-0.8, -0.2);
      md.pos.set(startX, startY, startZ);
      md.vel.set(Math.cos(angleH) * speed, Math.sin(angleH) * speed, r(-0.3, 0.3) * speed);
      md.age = 0;
      md.life = md.isFireball ? r(180, 350) : r(100, 250);
      md.trailLen = md.isFireball ? ri(45, 60) : ri(25, 45);
      md.trail = [];
      md.isFireball = Math.random() < 0.1;
      md.headColor = md.isFireball ? [1, 0.95, 0.7] : [1, 0.85, 0.35];
      if (md.isFireball) {
        meteorMeshes[i].material.color.set(0xffffdd);
        meteorMeshes[i].scale.set(1.8, 0.7, 0.7);
      } else {
        meteorMeshes[i].material.color.set(0xffdd55);
        meteorMeshes[i].scale.set(1, 0.35, 0.35);
      }
    }
  }
}

// ── PARTICLE SYSTEM (sparks / bursts) ─────────
var particleGroup = new THREE.Group();
scene.add(particleGroup);

var MAX_PARTICLES = 600;
var particlesData = [];
var particleMeshes = [];
var particleGeomTemplate = new THREE.SphereGeometry(0.04, 4, 3);

function createParticleMesh() {
  var mat = new THREE.MeshBasicMaterial({
    color: 0xffcc44,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.8
  });
  return new THREE.Mesh(particleGeomTemplate, mat);
}

// Pre-allocate particle pool
for (var pi = 0; pi < MAX_PARTICLES; pi++) {
  particlesData.push({
    pos: new THREE.Vector3(),
    vel: new THREE.Vector3(),
    life: 0,
    maxLife: 0,
    active: false
  });
  var pm = createParticleMesh();
  pm.visible = false;
  particleGroup.add(pm);
  particleMeshes.push(pm);
}

function burstParticles(worldPos, count, colors) {
  var n = count || ri(40, 100);
  var cols = colors || [[1, 0.7, 0], [1, 0.85, 0.4], [1, 0.75, 0.15], [1, 0.95, 0.7]];
  var spawned = 0;
  for (var i = 0; i < particlesData.length && spawned < n; i++) {
    if (!particlesData[i].active) {
      var pd = particlesData[i];
      pd.pos.copy(worldPos);
      var angle = r(0, Math.PI * 2);
      var phi = r(-Math.PI * 0.5, Math.PI * 0.5);
      var sp = r(0.02, 0.15);
      pd.vel.set(
        Math.cos(phi) * Math.cos(angle) * sp,
        Math.cos(phi) * Math.sin(angle) * sp,
        Math.sin(phi) * sp
      );
      pd.life = r(25, 70);
      pd.maxLife = pd.life;
      pd.active = true;
      var col = pick(cols);
      particleMeshes[i].material.color.setRGB(col[0], col[1], col[2]);
      particleMeshes[i].material.opacity = 0.8;
      particleMeshes[i].visible = true;
      particleMeshes[i].position.copy(worldPos);
      spawned++;
    }
  }
}

function updateParticles() {
  for (var i = 0; i < particlesData.length; i++) {
    var pd = particlesData[i];
    if (!pd.active) continue;
    pd.life--;
    if (pd.life <= 0) {
      pd.active = false;
      particleMeshes[i].visible = false;
      continue;
    }
    pd.pos.add(pd.vel);
    pd.vel.multiplyScalar(0.985);
    pd.vel.y += 0.0003;
    particleMeshes[i].position.copy(pd.pos);
    var alpha = pd.life / pd.maxLife;
    particleMeshes[i].material.opacity = alpha * 0.7;
    particleMeshes[i].scale.setScalar(0.6 + alpha * 0.6);
  }
}

// ── TOUCH TRAIL SYSTEM ────────────────────────
var trailLines = [];
var activeTrails = {};  // pointerId -> { points: [], line: THREE.Line }
var MAX_TRAIL_PTS = 80;

function screenToWorld(sx, sy, depth) {
  var ndc = new THREE.Vector3(
    (sx / innerWidth) * 2 - 1,
    -(sy / innerHeight) * 2 + 1,
    0.5
  );
  ndc.unproject(camera);
  var dir = ndc.sub(camera.position).normalize();
  return camera.position.clone().add(dir.multiplyScalar(depth || 6));
}

function createTrailLine() {
  var arr = new Float32Array(MAX_TRAIL_PTS * 3);
  var geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(arr, 3));
  geom.setDrawRange(0, 0);
  var mat = new THREE.LineBasicMaterial({
    color: 0xffc840,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.5,
    linewidth: 1
  });
  return new THREE.Line(geom, mat);
}

// ── MOUSE / TOUCH INPUT ───────────────────────
var mouseX = 0, mouseY = 0, targetMX = 0, targetMY = 0;
var isDragging = false;

canvas.addEventListener('pointerdown', function (e) {
  var wp = screenToWorld(e.clientX, e.clientY, 5.5);
  burstParticles(wp, 50);

  // Start trail
  activeTrails[e.pointerId] = {
    points: [wp.clone()],
    line: null
  };
  isDragging = true;
});

canvas.addEventListener('pointermove', function (e) {
  targetMX = e.clientX;
  targetMY = e.clientY;

  if (activeTrails[e.pointerId]) {
    var wp = screenToWorld(e.clientX, e.clientY, 5.5);
    var trail = activeTrails[e.pointerId];
    trail.points.push(wp.clone());
    if (trail.points.length > MAX_TRAIL_PTS) trail.points.shift();

    // Create or update line
    if (trail.points.length >= 2) {
      if (!trail.line) {
        trail.line = createTrailLine();
        scene.add(trail.line);
        trailLines.push(trail.line);
      }
      var geom = trail.line.geometry;
      var arr = geom.attributes.position.array;
      for (var i = 0; i < trail.points.length; i++) {
        arr[i * 3] = trail.points[i].x;
        arr[i * 3 + 1] = trail.points[i].y;
        arr[i * 3 + 2] = trail.points[i].z;
      }
      geom.attributes.position.needsUpdate = true;
      geom.setDrawRange(0, trail.points.length);
    }

    // Occasional spark
    if (Math.random() < 0.25) {
      burstParticles(wp, 3, [[1, 0.8, 0.2]]);
    }
  }
});

canvas.addEventListener('pointerup', function (e) {
  delete activeTrails[e.pointerId];
  isDragging = false;
});
canvas.addEventListener('pointerleave', function (e) {
  delete activeTrails[e.pointerId];
  isDragging = false;
});
window.addEventListener('mousemove', function (e) {
  targetMX = e.clientX;
  targetMY = e.clientY;
});

// ── WINDOW RESIZE ─────────────────────────────
window.addEventListener('resize', function () {
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ── ROMANCE SYSTEM ────────────────────────────
var ROMANCE = [
  'Xu Yiting, you are my universe ✨', 'Forever begins with you, Xu Yiting 💫',
  'My heart beats only for you 💗', 'You light up my entire world 🌟',
  'Lost in your eyes, Xu Yiting 🌌', 'Love you to the stars and back 🚀',
  'Every day with you is a gift 🎁', 'I fall for you every single day 💘',
  'With you, I am finally home 🏡', 'You are my dream come true, Xu Yiting 🌙',
  'A million stars could not match you ✨', 'Loving you is the easiest thing ever 💝',
  'Xu Yiting, you are my always and forever ♾️', 'My heart chose you — every time 💓',
  'Even the stars are jealous of you ⭐', 'You are my greatest adventure 🗺️',
  'I love you more than words can say 💕', 'Every love song reminds me of you 🎶',
  'Xu Yiting, would you be mine? 💍', 'I would find you in any lifetime 🔁',
  'Your smile is my favorite view 😊', 'You are the calm in my chaos 🧘',
  'I choose you — today, tomorrow, always 💯', 'Xu Yiting, you are all I ever wanted 🌠',
  'To the moon and back, Xu Yiting 🌓', 'You are my once in a lifetime 💎',
];

function autoRomance() {
  var text = ROMANCE[Math.floor(Math.random() * ROMANCE.length)];
  // Create DOM element for romance text
  var el = document.createElement('div');
  el.className = 'romance-msg';
  el.textContent = text;
  el.style.left = r(innerWidth * 0.1, innerWidth * 0.7) + 'px';
  el.style.top = r(innerHeight * 0.2, innerHeight * 0.7) + 'px';
  el.style.fontSize = (13 + Math.random() * 10) + 'px';
  romanceLayer.appendChild(el);

  // Remove after animation
  setTimeout(function () {
    if (el.parentNode) el.parentNode.removeChild(el);
  }, 4700);

  // 3D particle burst near Earth
  var burstCenter = new THREE.Vector3(3 + r(-1.5, 1.5), -1 + r(-1, 1), -8 + r(-1, 1));
  burstParticles(burstCenter, 30);
}

// ── ANIMATION LOOP ────────────────────────────
var clock = new THREE.Clock();
var romanceTick = 0;

function animate() {
  requestAnimationFrame(animate);

  var dt = Math.min(clock.getDelta(), 0.1);
  var elapsed = performance.now() * 0.001;

  // Smooth mouse tracking
  mouseX += (targetMX - mouseX) * 0.03;
  mouseY += (targetMY - mouseY) * 0.03;

  // Camera parallax orbit
  var px = (mouseX / innerWidth - 0.5) * 0.6;
  var py = (mouseY / innerHeight - 0.5) * 0.4;
  var baseX = Math.sin(elapsed * 0.12) * 0.35;
  var baseY = 0.3 + Math.sin(elapsed * 0.17) * 0.25;
  var baseZ = 4.5 + Math.cos(elapsed * 0.1) * 0.3;
  camera.position.set(baseX + px, baseY + py, baseZ);
  camera.lookAt(3 + px * 0.5, -1 + py * 0.5, -8);

  // Update atmosphere shader uniform
  atmosMat.uniforms.uViewPos.value.copy(camera.position);

  // Starfield slow rotation
  starFieldGroup.rotation.y += 0.00008;
  starFieldGroup.rotation.x += 0.00003;

  // Earth self-rotation
  earthMesh.rotation.y += 0.0025;

  // Nebula slow rotation
  nebulae.forEach(function (n) {
    n.rotation.z += n.userData.rotSpeed;
  });

  // Moon orbit
  var moonAngle = elapsed * 0.15;
  moonGroup.position.x = 2.0 + Math.cos(moonAngle) * 0.6;
  moonGroup.position.z = -9.5 + Math.sin(moonAngle) * 0.5;
  moonGroup.position.y = -1.4 + Math.sin(moonAngle * 0.7) * 0.3;

  // Meteors
  updateMeteors();

  // Particles
  updateParticles();

  // Clean old trail lines (fade check)
  for (var ti = trailLines.length - 1; ti >= 0; ti--) {
    var stillUsed = false;
    for (var key in activeTrails) {
      if (activeTrails[key].line === trailLines[ti]) { stillUsed = true; break; }
    }
    if (!stillUsed) {
      scene.remove(trailLines[ti]);
      trailLines[ti].geometry.dispose();
      trailLines[ti].material.dispose();
      trailLines.splice(ti, 1);
    }
  }

  // Render
  renderer.render(scene, camera);

  // Romance timer (~every 5 seconds at 60fps)
  romanceTick++;
  if (romanceTick % 300 === 0) autoRomance();
}

// ── INIT ──────────────────────────────────────
autoRomance();
animate();
</script>
