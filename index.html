<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>For Xu Yiting ✦ Earth from Space</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-tap-highlight-color:transparent;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H,dpr,time=0,meteors=[],sparks=[],trails=[],touches={},wishes=[],romanceTick=0;

function r(a,b){return a+Math.random()*(b-a)}
function ri(a,b){return Math.floor(r(a,b+1))}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function clamp(v,l,h){return Math.max(l,Math.min(h,v))}

function resize(){
  dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  c.width=W*dpr;c.height=H*dpr;
  c.style.width=W+'px';c.style.height=H+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
  initStars();initEarth();initMeteors();
}

// ── STARFIELD ────────────────────────────────
var stars=[];
function initStars(){
  stars=[];
  for(var i=0;i<1500;i++){
    var m=r(0,6),sz=m<1?r(1.5,3):m<3?r(0.8,1.8):r(0.3,0.9);
    var hue=pick([210,220,230,240,35,30,25,200,180]);
    stars.push({x:Math.random()*W,y:Math.random()*H,size:sz,baseAlpha:r(0.3,0.9),hue:hue,phase:Math.random()*6.28,freq:r(0.5,3)});
  }
  stars.sort(function(a,b){return b.size-a.size;});
}

// ── EARTH ─────────────────────────────────────
var earth={cx:0,cy:0,R:0};
function initEarth(){
  earth.R=Math.min(W,H)*0.18;
  earth.cx=W*0.78;earth.cy=H*0.65;
}
function drawEarth(){
  var ex=earth.cx,ey=earth.cy,eR=earth.R;
  // Atmosphere glow
  var ag=ctx.createRadialGradient(ex,ey,eR*0.9,ex,ey,eR*1.12);
  ag.addColorStop(0,'rgba(0,0,0,0)');
  ag.addColorStop(0.5,'rgba(60,140,240,0.15)');
  ag.addColorStop(0.75,'rgba(100,180,255,0.1)');
  ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.arc(ex,ey,eR*1.12,0,6.28);ctx.fill();

  // Ocean
  var og=ctx.createRadialGradient(ex-eR*0.2,ey-eR*0.15,0,ex,ey,eR);
  og.addColorStop(0,'#1446c8');og.addColorStop(0.5,'#002FA7');og.addColorStop(0.8,'#001860');og.addColorStop(1,'#000c30');
  ctx.fillStyle=og;ctx.beginPath();ctx.arc(ex,ey,eR,0,6.28);ctx.fill();

  // Continents
  ctx.save();ctx.beginPath();ctx.arc(ex,ey,eR,0,6.28);ctx.clip();
  var cons=[[ex-eR*0.1,ey-eR*0.3,eR*0.5,eR*0.35],[ex+ey*0,ex+ey*0,0,0]];
  var cc=[[ex-eR*0.05,ey-eR*0.25,eR*0.5,eR*0.38,0.1],[ex+0,ey+0,0,0,0]];
  var blobs=[
    [ex-eR*0.05,ey-eR*0.25,eR*0.5,eR*0.38,0.1],
    [ex+0,ey+0,0,0,0],
    [ex-eR*0.05,ey+ey*0,eR*0.22,eR*0.42,0.05],
    [ex-eR*0.3,ey-eR*0.32,eR*0.28,eR*0.32,-0.3],
    [ex-eR*0.22,ey+ey*0,eR*0.13,eR*0.22,0.15],
    [ex+ey*0,ex+0,eR*0.08,eR*0.1,0]
  ];
  // Simple green blobs
  var simpleCons=[
    {cx:ex-eR*0.05,cy:ey-eR*0.25,rx:eR*0.5,ry:eR*0.38,rot:0.1},
    {cx:ex-eR*0.05,cy:ey+eR*0.05,rx:eR*0.22,ry:eR*0.42,rot:0.05},
    {cx:ex-eR*0.3,cy:ey-eR*0.32,rx:eR*0.28,ry:eR*0.32,rot:-0.3},
    {cx:ex-eR*0.22,cy:ey+eR*0.28,rx:eR*0.13,ry:eR*0.22,rot:0.15},
    {cx:ex+eR*0.22,cy:ey+eR*0.2,rx:eR*0.1,ry:eR*0.12,rot:0},
    {cx:ex+eR*0.05,cy:ey+eR*0.6,rx:eR*0.35,ry:eR*0.15,rot:0},
    {cx:ex+eR*0.12,cy:ey-eR*0.2,rx:eR*0.1,ry:eR*0.15,rot:-0.2},
  ];
  simpleCons.forEach(function(sc){
    var cg=ctx.createRadialGradient(sc.cx,sc.cy,0,sc.cx,sc.cy,Math.max(sc.rx,sc.ry));
    cg.addColorStop(0,'rgba(30,140,60,0.85)');cg.addColorStop(0.6,'rgba(20,100,40,0.6)');cg.addColorStop(1,'rgba(10,50,20,0.2)');
    ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(sc.cx,sc.cy,sc.rx,sc.ry,sc.rot,0,6.28);ctx.fill();
  });

  // Terminator night side
  var tg=ctx.createLinearGradient(ex-eR*0.6,ey,ex+eR*0.5,ey);
  tg.addColorStop(0,'rgba(0,0,0,0)');tg.addColorStop(0.3,'rgba(0,0,10,0.05)');
  tg.addColorStop(0.45,'rgba(220,100,20,0.2)');tg.addColorStop(0.5,'rgba(255,140,40,0.28)');
  tg.addColorStop(0.55,'rgba(200,60,10,0.2)');tg.addColorStop(0.7,'rgba(5,3,20,0.7)');
  tg.addColorStop(1,'rgba(2,1,15,0.92)');
  ctx.fillStyle=tg;ctx.fillRect(ex-eR,ey-eR,eR*2,eR*2);

  // City lights on night side
  ctx.globalCompositeOperation='lighter';
  for(var i=0;i<60;i++){
    var lx=ex+ex*0+ey*0,ly=ey+ex*0+ey*0;
    lx=ex+eR*r(-0.15,0.5);ly=ey+eR*r(-0.7,0.7);
    var dist=Math.sqrt((lx-ex)*(lx-ex)+(ly-ey)*(ly-ey));
    if(dist>eR*0.95)continue;
    var isNight=(lx>ex-eR*0.1);
    if(!isNight)continue;
    var lr=ctx.createRadialGradient(lx,ly,0,lx,ly,r(1,4));
    var bright=r(0.3,0.7);
    var isAsia=lx>ex&&ly<ey-eR*0.1;
    var c=isAsia?'rgba(220,225,255,'+bright+')':'rgba(255,200,110,'+bright+')';
    lr.addColorStop(0,c);lr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lr;ctx.fillRect(lx-5,ly-5,10,10);
  }
  ctx.globalCompositeOperation='source-over';
  ctx.restore();

  // Aurora hint
  ctx.save();ctx.beginPath();ctx.arc(ex,ey,eR*1.02,0,6.28);ctx.clip();
  ctx.globalCompositeOperation='lighter';
  for(var i=0;i<20;i++){
    var aa=r(0,6.28),arx=eR*0.55+r(-0.05,0.05)*eR,ary=eR*0.16+r(-0.03,0.03)*eR;
    var ax=ex+Math.cos(aa)*arx,ay=ey-eR*0.55+Math.sin(aa)*ary;
    var aug=ctx.createRadialGradient(ax,ay,0,ax,ay,r(6,20));
    aug.addColorStop(0,'rgba(100,255,150,'+r(0.1,0.25)+')');aug.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=aug;ctx.fillRect(ax-25,ay-25,50,50);
  }
  ctx.globalCompositeOperation='source-over';ctx.restore();
}

// ── METEORS ───────────────────────────────────
function initMeteors(){
  meteors=[];
  for(var i=0;i<12;i++)spawnMeteor(true);
}
function spawnMeteor(init){
  var a=r(-2.2,-0.9),sp=r(3,9);
  meteors.push({
    x:r(0,W),y:r(0,H*0.5),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
    life:r(20,50),age:init?r(0,40):0,
    trail:[],maxTrail:ri(80,180),
    head:[255,220,80],tail:[200,130,30]
  });
}
function drawMeteor(m){
  m.age++;m.x+=m.vx;m.y+=m.vy;
  if(m.age>m.life||m.x<-30||m.x>W+30||m.y<-30||m.y>H+30){
    var a=r(-2.2,-0.9),sp=r(3,9);
    m.x=r(0,W);m.y=r(0,H*0.5);m.vx=Math.cos(a)*sp;m.vy=Math.sin(a)*sp;
    m.age=0;m.life=r(20,50);m.trail=[];return;
  }
  m.trail.push({x:m.x,y:m.y,life:1});
  if(m.trail.length>m.maxTrail)m.trail.shift();
  for(var i=0;i<m.trail.length;i++)m.trail[i].life-=0.012;

  ctx.globalCompositeOperation='lighter';
  // Trail
  for(var i=1;i<m.trail.length;i++){
    var p=m.trail[i];if(p.life<=0)continue;
    var prog=i/m.trail.length;
    var cr=Math.round(m.head[0]+(m.tail[0]-m.head[0])*prog);
    var cg=Math.round(m.head[1]+(m.tail[1]-m.head[1])*prog);
    var cb=Math.round(m.head[2]+(m.tail[2]-m.head[2])*prog);
    ctx.fillStyle='rgba('+cr+','+cg+','+cb+','+(p.life*0.5)+')';
    var sz=(1-prog)*1.5;
    ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);
  }
  // Head glow
  var g=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,8);
  g.addColorStop(0,'rgba(255,240,180,0.8)');g.addColorStop(0.4,'rgba(255,200,80,0.4)');g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(m.x-9,m.y-9,18,18);
  ctx.globalCompositeOperation='source-over';
}

// ── SPARKS ────────────────────────────────────
function burstSparks(cx,cy,count){
  var n=count||ri(60,120);
  for(var i=0;i<n;i++){
    var a=r(0,6.28),sp=r(1.5,6);
    sparks.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:r(20,50),maxLife:50,size:r(1,3),color:pick([[255,176,0],[255,220,120],[255,200,60],[255,240,200]])});
  }
}

// ── TOUCH ─────────────────────────────────────
function getPos(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
c.addEventListener('pointerdown',function(e){
  var p=getPos(e);touches[e.pointerId]=[];trails.push(touches[e.pointerId]);
  touches[e.pointerId].push({x:p.x,y:p.y,age:0});burstSparks(p.x,p.y,50);
});
c.addEventListener('pointermove',function(e){
  if(!touches[e.pointerId])return;
  var p=getPos(e);touches[e.pointerId].push({x:p.x,y:p.y,age:0});
  if(touches[e.pointerId].length>60)touches[e.pointerId].shift();
  if(Math.random()<0.2)sparks.push({x:p.x,y:p.y,vx:r(-1,1),vy:r(-1,1),life:15,maxLife:15,size:r(0.5,1.5),color:[255,200,60]});
});
c.addEventListener('pointerup',function(e){delete touches[e.pointerId];});
c.addEventListener('pointerleave',function(e){delete touches[e.pointerId];});
window.addEventListener('resize',resize);

// ── ROMANCE ───────────────────────────────────
var ROMANCE=[
  'Xu Yiting, you are my universe ✨','Forever begins with you, Xu Yiting 💫',
  'My heart beats only for you 💗','You light up my entire world 🌟',
  'Lost in your eyes, Xu Yiting 🌌','Love you to the stars and back 🚀',
  'Every day with you is a gift 🎁','I fall for you every single day 💘',
  'With you, I am finally home 🏡','You are my dream come true, Xu Yiting 🌙',
  'A million stars could not match you ✨','Loving you is the easiest thing ever 💝',
  'Xu Yiting, you are my always and forever ♾️','My heart chose you — every time 💓',
  'Even the stars are jealous of you ⭐','You are my greatest adventure 🗺️',
  'I love you more than words can say 💕','Every love song reminds me of you 🎶',
  'Xu Yiting, would you be mine? 💍','I would find you in any lifetime 🔁',
  'Your smile is my favorite view 😊','You are the calm in my chaos 🧘',
  'I choose you — today, tomorrow, always 💯','Xu Yiting, you are all I ever wanted 🌠',
  'To the moon and back, Xu Yiting 🌓','You are my once in a lifetime 💎',
];
function autoRomance(){
  var t=ROMANCE[Math.floor(Math.random()*ROMANCE.length)];
  wishes.push({text:t,x:r(W*0.1,W*0.9),y:r(H*0.2,H*0.8),age:0,maxAge:200});
  burstSparks(W/2+r(-100,100),H/2+r(-100,100),30);
}

// ── RENDER LOOP ───────────────────────────────
function draw(ts){
  time=ts;
  ctx.fillStyle='rgba(0,0,5,0.08)';ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(function(s){
    var tw=0.6+0.4*Math.sin(time*0.0004*s.freq+s.phase);
    var a=s.baseAlpha*tw;if(a<0.03)return;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,6.28);
    ctx.fillStyle='hsla('+s.hue+',30%,85%,'+a+')';ctx.fill();
    if(s.size>1.5){ctx.beginPath();ctx.arc(s.x,s.y,s.size*2.5,0,6.28);
    ctx.fillStyle='hsla('+s.hue+',30%,75%,'+(a*0.1)+')';ctx.fill();}
  });

  // Earth
  drawEarth();

  // Meteors
  meteors.forEach(drawMeteor);

  // Touch trails
  trails.forEach(function(tr){
    if(tr.length<2)return;
    ctx.globalCompositeOperation='lighter';
    for(var i=1;i<tr.length;i++){tr[i].age++;
      var a=clamp(1-tr[i].age/60,0,1)*0.4;if(a<0.01)continue;
      ctx.beginPath();ctx.moveTo(tr[i-1].x,tr[i-1].y);ctx.lineTo(tr[i].x,tr[i].y);
      ctx.lineWidth=2*a;ctx.strokeStyle='rgba(255,200,60,'+a+')';ctx.stroke();
    }
    ctx.globalCompositeOperation='source-over';
  });
  // Clean dead trails
  for(var i=trails.length-1;i>=0;i--){if(trails[i].every(function(p){return p.age>60;}))trails.splice(i,1);}

  // Sparks
  ctx.globalCompositeOperation='lighter';
  for(var i=sparks.length-1;i>=0;i--){
    var p=sparks[i];p.life--;if(p.life<=0){sparks.splice(i,1);continue;}
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.98;p.vy*=0.98;p.vy+=0.02;
    var a=p.life/p.maxLife;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,6.28);
    ctx.fillStyle='rgba('+p.color[0]+','+p.color[1]+','+p.color[2]+','+(a*0.7)+')';ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';

  // Romance text
  wishes.forEach(function(w){w.age++;});
  wishes=wishes.filter(function(w){return w.age<w.maxAge;});
  wishes.forEach(function(w){
    var p=w.age/w.maxAge,a=p<0.1?p/0.1:p>0.7?(1-p)/0.3:1;if(a<0.01)return;
    ctx.save();ctx.globalAlpha=a;
    ctx.fillStyle='#ffd700';ctx.font='bold '+(13+p*7)+'px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign='center';ctx.shadowColor='rgba(255,107,157,0.5)';ctx.shadowBlur=10;
    ctx.fillText(w.text,w.x,w.y-w.age*0.4);ctx.restore();
  });

  // Timer
  romanceTick++;
  if(romanceTick%300===0)autoRomance();

  requestAnimationFrame(draw);
}

resize();autoRomance();requestAnimationFrame(draw);
})();
</script>
</body>
</html>
